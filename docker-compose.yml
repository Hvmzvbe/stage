# ===========================================================================
# docker-compose.yml
# Projet : Plateforme MLOps - Détection de Fraude (Al Barid Bank)
# Auteur : Hamza (PFE EMSI 2025-2026)
# ---------------------------------------------------------------------------
# Services :
#   1. Zookeeper       — Coordination Kafka
#   2. Kafka            — Message broker (4 topics)
#   3. Kafka UI         — Interface web (port 8080)
#   4. ingestion        — main.py (parser + validator + routing)
#   5. producer         — kafka_producer.py (simulateur switch)
#   6. notification     — kafka_notification.py (alertes e-mail)
#
# Usage :
#   docker-compose up -d                    # Lancer tout
#   docker-compose up -d --build            # Rebuild + lancer
#   docker-compose logs -f ingestion        # Suivre les logs
#   docker-compose down                     # Arrêter tout
#   docker-compose down -v                  # Arrêter + supprimer volumes
# ===========================================================================

version: '3.8'

services:

  # ─────────────────────────────────────────────────────────────
  # ZOOKEEPER — Coordination Kafka
  # ─────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: barid-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - barid-network
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # KAFKA — Message Broker
  # ─────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: barid-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    networks:
      - barid-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────────────────────
  # KAFKA INIT — Création des 4 topics
  # ─────────────────────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: barid-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo '=== Création des topics Kafka ==='

      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 \
        --topic raw_stream --partitions 3 --replication-factor 1
      echo '✓ raw_stream'

      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 \
        --topic cleaned_transactions --partitions 3 --replication-factor 1
      echo '✓ cleaned_transactions'

      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 \
        --topic quarantine_transactions --partitions 3 --replication-factor 1
      echo '✓ quarantine_transactions'

      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 \
        --topic parsing_errors --partitions 1 --replication-factor 1
      echo '✓ parsing_errors'

      echo '=== Topics créés avec succès ==='
      kafka-topics --list --bootstrap-server kafka:9092
      "
    networks:
      - barid-network

  # ─────────────────────────────────────────────────────────────
  # KAFKA UI — Interface web de monitoring
  # ─────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: barid-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "Al-Barid-Bank-Fraud-Detection"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - barid-network

  # ─────────────────────────────────────────────────────────────
  # INGESTION PIPELINE — main.py (Parser + Validator + Routing)
  # ─────────────────────────────────────────────────────────────
  ingestion:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: barid-ingestion
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ingestion-data:/app/data
    networks:
      - barid-network
    restart: on-failure

  # ─────────────────────────────────────────────────────────────
  # PRODUCER — Simulateur Switch Monétique ISO 8583
  # ─────────────────────────────────────────────────────────────
  producer:
    build:
      context: .
      dockerfile: Dockerfile.producer
    container_name: barid-producer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      PYTHONUNBUFFERED: "1"
    networks:
      - barid-network
    # Délai de 10s pour laisser l'ingestion démarrer
    entrypoint: ["/bin/bash", "-c", "sleep 10 && python kafka_producer.py --bootstrap kafka:9092 --delay 3"]

  # ─────────────────────────────────────────────────────────────
  # NOTIFICATION — Consumer alertes e-mail
  # ─────────────────────────────────────────────────────────────
  notification:
    build:
      context: .
      dockerfile: Dockerfile.notification
    container_name: barid-notification
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      PYTHONUNBUFFERED: "1"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
    volumes:
      - notification-logs:/app/data/notification_logs
    networks:
      - barid-network
    # Par défaut en dry-run si pas de SMTP configuré
    command: >
      --bootstrap kafka:9092
      --recipients ${ALERT_RECIPIENTS:-hamzabeng64@gmail.com}
      ${NOTIFICATION_DRY_RUN:---dry-run}

# ─────────────────────────────────────────────────────────────
# VOLUMES — Persistance des données
# ─────────────────────────────────────────────────────────────
volumes:
  ingestion-data:
    name: barid-ingestion-data
  notification-logs:
    name: barid-notification-logs

# ─────────────────────────────────────────────────────────────
# RÉSEAU — Communication inter-services
# ─────────────────────────────────────────────────────────────
networks:
  barid-network:
    driver: bridge
    name: barid-network
